name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: oidc-linux-amd64
            runner: ubuntu-latest
            task: build
            output: oidc
          - name: oidc-gui-linux-amd64
            runner: ubuntu-latest
            task: build-gui
            output: oidc
          - name: oidc-windows-amd64.exe
            runner: windows-latest
            task: build
            output: oidc.exe
          - name: oidc-gui-windows-amd64.exe
            runner: windows-latest
            task: build-gui
            output: oidc.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          cache: true

      - name: Build
        run: pixi run ${{ matrix.task }}

      - name: Rename artifact
        shell: bash
        run: mv "${{ matrix.output }}" "${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} artifacts/* --generate-notes
