name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          cache: true

      - name: Lint (Go + Python + Java)
        run: pixi run lint

      - name: Test (Go + Python + Java)
        run: pixi run test

      - name: Build CLI
        run: pixi run build

      - name: Build GUI (Fyne / CGO)
        run: pixi run build-gui

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.10
        with:
          cache: true

      - name: Test Go
        run: pixi run test-go

      - name: Build CLI
        run: pixi run build

      - name: Build GUI (Fyne / CGO)
        run: pixi run build-gui
